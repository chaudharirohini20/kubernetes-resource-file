apiVersion: V1
kind: ReplicationController
metadata:
  name: my-rc
  labels:
    app: myapp
spec:
  replicas: 3
  template:
     metadata:
        labels:
        app: myapp
     spec:
      containers:
        - name : new-conatiner
          imange: nginx:latest
      ports:
        - containerPort: 80
selector:
    app: myapp

---
#yaml file for service
apiVersion : v1
kind : service    
metadata:
  name : svc 
  label : 
     app : myapp
     env : dev
  spec: 
    ports:
      - targetPort: 80
        protocol: TCP 
  type : NodePort 
  selector:
    app: myapp

    