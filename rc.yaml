apiVersion: v1
kind: ReplicationController
metadata:
  name: my-rc
  labels:
    app: myapp
  spec:
  replicas: 3
  template:
    metadata:
      labels:
        app: myapp
      spec:
        containers:
        - name : new-conatiner
          imange: httpd
          ports:
          - containerPort: 80
  selector:
    app: myapp

    